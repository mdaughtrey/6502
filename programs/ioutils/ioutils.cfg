MEMORY {
RAM1: start = $0000, size = $10000;
ROM1: start = $0000, size = $10000, file = "rom1.bin", fill=true;
}

SEGMENTS {
ZEROPAGE: load = RAM1, type = rw, start = $0000;
# IO: load = RAM1, type = rw, start = $0200;
IOHOST: load = RAM1, type = rw, start = $0300;
DATA: load = RAM1, type = rw, start = $0400;
CODE: load = ROM1, type = ro, start = $1000;
RODATA: load = ROM1, type = ro, start = $f000 ;
RESETVEC: load = ROM1, type = ro, start = $fffc ;
IRQVEC: load = ROM1, type = ro, start = $fffe ;
BSS: load = RAM1, type = rw;
}
